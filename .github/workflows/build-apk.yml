name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: songloft-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Get version
        id: version
        run: echo "version=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Delete old release
        run: gh release delete latest --yes --repo ${{ github.repository }} || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Songloft ${{ steps.version.outputs.version }}
          body: |
            自动构建 - ${{ github.sha }}
            基于 commit: ${{ github.event.head_commit.message }}
          files: build/app/outputs/flutter-apk/app-release.apk
          prerelease: true
