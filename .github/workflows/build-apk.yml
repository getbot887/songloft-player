name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup signing
        run: |
          KEYSTORE_PATH="${{ github.workspace }}/songloft-release.jks"
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
            echo "USING_SECRETS=true" >> "$GITHUB_ENV"
          else
            echo "No keystore secrets found, generating temporary keystore..."
            keytool -genkey -v -keystore "$KEYSTORE_PATH" \
              -alias songloft -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass songloft123 -keypass songloft123 \
              -dname "CN=Songloft, OU=Dev, O=Songloft, L=Unknown, ST=Unknown, C=CN"
            echo "USING_SECRETS=false" >> "$GITHUB_ENV"
          fi

      - name: Set dynamic version
        run: |
          RUN_NUM=${{ github.run_number }}
          sed -i "s/^version: .*/version: 2.8.${RUN_NUM}+${RUN_NUM}/" pubspec.yaml

      - run: flutter pub get
      - run: flutter build apk --release --target-platform android-arm64
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/songloft-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD || 'songloft123' }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEY_ALIAS || 'songloft' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEY_PASSWORD || 'songloft123' }}

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/songloft-arm64-v8a.apk

      - uses: actions/upload-artifact@v4
        with:
          name: songloft-arm64-v8a
          path: build/app/outputs/flutter-apk/songloft-arm64-v8a.apk

      - name: Get version
        id: version
        run: |
          BASE_VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          VERSION_NAME=$(echo "$BASE_VERSION" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$BASE_VERSION" | cut -d'+' -f2)
          echo "version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Delete old latest tag
        run: gh api repos/${{ github.repository }}/git/refs/tags/latest -X DELETE 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Songloft ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }})
          body: |
            自动构建 #${{ github.run_number }}
            版本: ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}
            Commit: ${{ github.sha }}
            ${{ github.event.head_commit.message }}
          files: build/app/outputs/flutter-apk/songloft-arm64-v8a.apk
          prerelease: true

      - name: Update latest tag
        if: success()
        run: |
          git tag -f latest
          git push -f origin latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Feishu
        if: always() && secrets.FEISHU_WEBHOOK_URL != ''
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            COLOR="green"
            TITLE="构建成功"
            CONTENT="版本: ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}\nCommit: ${{ github.sha }}\n详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            COLOR="red"
            TITLE="构建失败"
            CONTENT="Commit: ${{ github.sha }}\n详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "header": {
                  "title": { "tag": "plain_text", "content": "'"$TITLE"'" },
                  "template": "'"$COLOR"'"
                },
                "elements": [
                  {
                    "tag": "markdown",
                    "content": "**项目:** songloft-player\n**触发:** '"${{ github.event_name }}"'\n**分支:** '"${{ github.ref_name }}"'"'
                  },
                  {
                    "tag": "markdown",
                    "content": "'"${CONTENT}"'"
                  },
                  {
                    "tag": "action",
                    "actions": [
                      {
                        "tag": "button",
                        "text": { "tag": "plain_text", "content": "查看详情" },
                        "type": "primary",
                        "url": "'"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"'"
                      }
                    ]
                  }
                ]
              }
            }'
