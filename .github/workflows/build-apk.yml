name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get
      - run: flutter build apk --release --target-platform android-arm64

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/songloft-arm64-v8a.apk

      - uses: actions/upload-artifact@v4
        with:
          name: songloft-arm64-v8a
          path: build/app/outputs/flutter-apk/songloft-arm64-v8a.apk

      - name: Get version
        id: version
        run: |
          BASE_VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          FULL_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT

      - name: Delete old latest tag
        run: gh api repos/${{ github.repository }}/git/refs/tags/latest -X DELETE 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Songloft ${{ steps.version.outputs.full_version }}
          body: |
            自动构建 #${{ github.run_number }}
            版本: ${{ steps.version.outputs.full_version }}
            Commit: ${{ github.sha }}
            ${{ github.event.head_commit.message }}
          files: build/app/outputs/flutter-apk/songloft-arm64-v8a.apk
          prerelease: true

      - name: Update latest tag
        run: |
          git tag -f latest
          git push -f origin latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
